[package]
edition = "2024"

name = "floria"
description = "Floria data system for cloud orchestration"
version = "0.0.5"
rust-version = "1.91"

license = "MIT OR Apache-2.0"
repository = "https://github.com/tliron/floria"
documentation = "https://docs.rs/floria"
authors = ["Tal Liron"]

readme = "../README.md"

categories = [] # https://crates.io/category_slugs
keywords = [
    "cloud",
    "orchestration",
    "wasm",
    "tosca",
    "khutulun",
]

[dependencies]
anyhow = "1.0.100"
compris = { version = "=0.0.11", features = ["serde"] }
depiction = "=0.0.1"
duplicate = "2.0.1"
kutil = { version = "=0.0.5", features = ["std", "fast_collections", "immutable"] }
ordered-float = "5.1.0"
thiserror = "2.0.17"
tracing = "0.1.41"
# https://docs.rs/wasmtime/latest/wasmtime/index.html#crate-features
wasmtime = { optional = true, version = "38.0.4", default-features = false, features = [
    "cranelift",
    "parallel-compilation",
    "pooling-allocator",
] }
wasmtime-wasi = { optional = true, version = "38.0.4", default-features = false, features = ["p2"] }

[features]
plugins = ["dep:wasmtime", "dep:wasmtime-wasi"]
wasm-debug = [
    "wasmtime/demangle",
    "wasmtime/profiling",
    "wasmtime/coredump",
    "wasmtime/addr2line",
    "wasmtime/debug-builtins",
]

# https://stackoverflow.com/a/61417700
[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
